name: Build combined opencode (iframe + cache-tuning)

# Manual trigger only.  Both feature branches are rebased manually onto upstream
# `dev` (or whichever upstream tip you target), so cron-driven rebuilds would
# fire whether or not anything actually changed.  After rebasing and pushing
# either branch, run:
#
#   gh workflow run build-combined.yml --repo csillag/opencode
#
# (Optionally pass `--field iframe_ref=...` / `--field cache_ref=...` to pin
# specific commits instead of the branch tips.)
on:
  workflow_dispatch:
    inputs:
      iframe_ref:
        description: "Ref for iframe-embeddable branch"
        required: false
        default: csillag/make-web-embeddable-in-iframes
      cache_ref:
        description: "Ref for prompt-cache-tuning branch"
        required: false
        default: csillag/anthropic-prompt-cache-tuning
      release:
        description: "Publish a GitHub release with the binaries (false = artifacts only, 90d retention)"
        required: false
        default: "true"
      allow_non_release_base:
        description: "Allow building when the shared base of both feature branches is not exactly an upstream release tag.  Default 'false' enforces the rebase-onto-latest-release process documented in AGENTS.md."
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.merge_base.outputs.base }}
      iframe_sha: ${{ steps.shas.outputs.iframe_sha }}
      cache_sha: ${{ steps.shas.outputs.cache_sha }}
      upstream_version: ${{ steps.upstream.outputs.upstream_version }}
      upstream_tag: ${{ steps.upstream.outputs.upstream_tag }}
      binary_version: ${{ steps.upstream.outputs.binary_version }}
      release_tag: ${{ steps.shas.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch feature branches + upstream release tags
        run: |
          set -euo pipefail
          git fetch origin "${{ inputs.iframe_ref }}":refs/remotes/origin/iframe
          git fetch origin "${{ inputs.cache_ref }}":refs/remotes/origin/cache
          # Upstream release tags drive the binary's version string.  Git
          # refspec wildcards only support `*` as a full path component
          # (`refs/tags/v[0-9]*` returns "fatal: invalid refspec"), so fetch
          # ALL upstream tags — `vscode-v0.0.X` extension tags come along too.
          # Later `git tag -l 'v[0-9]*'` (a shell-glob, not a refspec) filters
          # to the semver-shaped tags we actually care about.
          git remote add upstream https://github.com/anomalyco/opencode.git 2>/dev/null || true
          git fetch upstream 'refs/tags/*:refs/tags/*' 2>&1 | tail -5

      - name: Compute merge-base + verify both branches share it
        id: merge_base
        run: |
          set -euo pipefail
          BASE=$(git merge-base origin/iframe origin/cache)
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "Shared base: $BASE"
          git log --oneline -1 "$BASE"

          IFRAME_AHEAD=$(git rev-list --count "$BASE..origin/iframe")
          CACHE_AHEAD=$(git rev-list --count "$BASE..origin/cache")
          echo "iframe is $IFRAME_AHEAD commits ahead of base"
          echo "cache  is $CACHE_AHEAD commits ahead of base"

          # Sanity: both branches should be small focused patches.  Spike count
          # is a heuristic for "someone forgot to rebase" — fail loudly so the
          # operator sees the drift before a stale build ships.
          if [ "$IFRAME_AHEAD" -gt 20 ] || [ "$CACHE_AHEAD" -gt 20 ]; then
            echo "::warning::One feature branch has many commits ahead of base ($IFRAME_AHEAD / $CACHE_AHEAD).  Verify both are rebased onto the same upstream tip."
          fi

      - name: Verify base is an upstream release tag + derive version
        id: upstream
        # The build process documented in AGENTS.md rebases both feature
        # branches onto the latest upstream `v<major>.<minor>.<patch>` release
        # tag.  Enforce that here so binary VERSION reflects a real upstream
        # release; pass `allow_non_release_base=true` to bypass during
        # one-off experiments.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BASE="${{ steps.merge_base.outputs.base }}"
          # Query upstream's GH releases directly: a local-tag-based query
          # (`git for-each-ref 'refs/tags/v[0-9]*'`) sees this fork's own
          # release tags too — `v1.14.45-csillag.X` lexically out-sorts
          # upstream `v1.14.45` under git's `v:refname` semver-aware sort
          # (semver pre-release tag ordering inverts what git assumes), so
          # the "latest upstream release" check would falsely flag every
          # already-built combined release as a newer upstream.
          LATEST_RELEASE=$(gh release view --repo anomalyco/opencode --json tagName -q .tagName)
          echo "Latest upstream release tag (via gh): $LATEST_RELEASE"

          if EXACT=$(git describe --tags --exact-match --match 'v[0-9]*' "$BASE" 2>/dev/null); then
            VERSION="${EXACT#v}"
            echo "✓ Base $BASE is exactly upstream release $EXACT (version $VERSION)"
            if [ "$EXACT" != "$LATEST_RELEASE" ]; then
              echo "::warning::Base is at $EXACT but latest upstream release is $LATEST_RELEASE.  Consider rebasing both feature branches onto $LATEST_RELEASE — see AGENTS.md."
            fi
            echo "upstream_version=$VERSION"        >> "$GITHUB_OUTPUT"
            echo "upstream_tag=$EXACT"              >> "$GITHUB_OUTPUT"
            echo "binary_version=${VERSION}-csillag" >> "$GITHUB_OUTPUT"
          else
            NEAREST=$(git describe --tags --match 'v[0-9]*' "$BASE" 2>/dev/null || echo "(none)")
            if [ "${{ inputs.allow_non_release_base }}" != "true" ]; then
              echo "::error::Shared base $BASE is NOT an upstream release tag (nearest: $NEAREST)."
              echo "::error::The build process requires both feature branches to be rebased onto a release tag (latest is $LATEST_RELEASE)."
              echo "::error::See AGENTS.md → 'Rebase procedure'.  To bypass for a one-off, re-dispatch with allow_non_release_base=true."
              exit 1
            fi
            VERSION="${NEAREST#v}-dirty"
            echo "::warning::Base is not at a release tag.  Falling back to OPENCODE_VERSION=$VERSION-csillag (allow_non_release_base override active)."
            echo "upstream_version=$VERSION"        >> "$GITHUB_OUTPUT"
            echo "upstream_tag="                    >> "$GITHUB_OUTPUT"
            echo "binary_version=${VERSION}-csillag" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve short SHAs + GH release tag
        id: shas
        run: |
          set -euo pipefail
          IFRAME_SHA=$(git rev-parse --short origin/iframe)
          CACHE_SHA=$(git rev-parse --short origin/cache)
          BIN_VERSION="${{ steps.upstream.outputs.binary_version }}"
          # GH release tag stays unique per (upstream-version, branch-SHAs) so
          # repeated builds against the same upstream release with new feature
          # branch tips don't collide.  Binary --version is just `${ver}-csillag`.
          RELEASE_TAG="v${BIN_VERSION}.${IFRAME_SHA}.${CACHE_SHA}"
          echo "iframe_sha=$IFRAME_SHA" >> "$GITHUB_OUTPUT"
          echo "cache_sha=$CACHE_SHA"   >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          # Also re-emit binary_version through the prep job's outputs for
          # downstream visibility.
          echo "Release tag: $RELEASE_TAG"
          echo "Binary OPENCODE_VERSION: $BIN_VERSION"

  build:
    needs: prep
    # Single ubuntu runner builds all 12 targets via Bun cross-compilation
    # (linux glibc + linux musl + darwin + windows, with baseline variants).
    # No macOS runner needed: macOS binaries here are unsigned regardless of
    # host OS, so the only benefit of a macos-latest runner would be code
    # signing — not in scope yet.  packages/opencode/script/build.ts emits the
    # full target set when `--single` is not passed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch feature branches
        run: |
          git fetch origin "${{ inputs.iframe_ref }}":refs/remotes/origin/iframe
          git fetch origin "${{ inputs.cache_ref }}":refs/remotes/origin/cache

      - name: Combine branches
        run: |
          set -euo pipefail
          git config user.email "ci@local"
          git config user.name "Build CI"
          git checkout -B combined "${{ needs.prep.outputs.base }}"

          # Both feature branches sit on the shared base, so each merge is a
          # fast-forward when the branches don't touch overlapping files.
          # `--no-ff` keeps both commit ancestries visible in the build's git log;
          # the resulting tree is identical to a local `git merge feat/X feat/Y`.
          git merge --no-ff --no-edit origin/iframe
          git merge --no-ff --no-edit origin/cache

          echo "--- Combined log ---"
          git log --oneline -10

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build CLI (all 12 targets)
        run: |
          cd packages/opencode
          bun run script/build.ts
        env:
          # `<upstream-release>-csillag` (e.g. `1.14.45-csillag`).  Resolved by
          # the `upstream` step in the prep job from the latest release tag the
          # shared base sits on.  Becomes the binary's `--version` output via
          # packages/opencode/script/build.ts → Script.version.
          OPENCODE_VERSION: ${{ needs.prep.outputs.binary_version }}

      - name: Package archives
        # Uniform .zip across all OSes for a single consumer-script extraction
        # path.  Info-ZIP encodes Unix file modes in the archive's extra
        # fields, so `unzip` on Linux/macOS restores the +x bit on bin/opencode
        # without a follow-up `chmod`.  Globbing the dist tree avoids
        # hard-coding the 12-target list — when build.ts adds or drops a
        # target, this step picks it up.
        run: |
          set -euo pipefail
          mkdir -p /tmp/dist
          shopt -s nullglob
          for dir in packages/opencode/dist/opencode-*/; do
            arch=$(basename "$dir" | sed 's/^opencode-//')
            (cd "$dir" && zip -qr "/tmp/dist/opencode-$arch.zip" .)
          done
          echo "--- packaged ---"
          ls -lh /tmp/dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: opencode-binaries
          path: /tmp/dist/*
          retention-days: 90

  publish:
    if: ${{ inputs.release == 'true' }}
    needs: [prep, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: opencode-binaries
          path: /tmp/dl

      - name: List downloaded
        run: ls -lh /tmp/dl

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prep.outputs.release_tag }}
          name: ${{ needs.prep.outputs.release_tag }}
          body: |
            Combined build of two feature branches rebased onto an upstream release.

            - **upstream release** @ `${{ needs.prep.outputs.upstream_tag }}` → `opencode --version` reports `${{ needs.prep.outputs.binary_version }}`
            - **iframe-embeddable** @ `${{ needs.prep.outputs.iframe_sha }}`
              (`${{ inputs.iframe_ref }}`)
            - **anthropic-prompt-cache-tuning** @ `${{ needs.prep.outputs.cache_sha }}`
              (`${{ inputs.cache_ref }}`)

            All 12 build targets included as `.zip`: linux-{arm64,x64,x64-baseline,arm64-musl,x64-musl,x64-baseline-musl}, darwin-{arm64,x64,x64-baseline}, windows-{arm64,x64,x64-baseline}.

            Extraction restores the `bin/opencode` executable bit on POSIX (Info-ZIP encodes Unix modes; `unzip` honors them).

            Built by `.github/workflows/build-combined.yml` on `csillag/opencode@main`.  Rebase procedure: see `AGENTS.md`.
          files: /tmp/dl/*
          fail_on_unmatched_files: true
